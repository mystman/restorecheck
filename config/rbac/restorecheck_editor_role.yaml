# This rule is not used by the project restorecheck itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the restorecheck.mystman.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: restorecheck
    app.kubernetes.io/managed-by: kustomize
  name: restorecheck-editor-role
rules:
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks/status
  verbs:
  - get
