# This rule is not used by the project restorecheck itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to restorecheck.mystman.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: restorecheck
    app.kubernetes.io/managed-by: kustomize
  name: restorecheck-viewer-role
rules:
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks/status
  verbs:
  - get
