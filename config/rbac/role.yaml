---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks/finalizers
  verbs:
  - update
- apiGroups:
  - restorecheck.mystman.com
  resources:
  - restorechecks/status
  verbs:
  - get
  - patch
  - update
